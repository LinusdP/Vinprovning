<div class="smakklocka-wrapper">
  <div class="clock-face">
    {% if include.min and include.max %}
      <div class="cone" style="--start: {{ include.min }}; --end: {{ include.max }};"></div>
    {% elsif include.value %}
      <div class="hand" style="--hour: {{ include.value }};"></div>
    {% endif %}
    <div class="tick" style="--i: 1;"></div><div class="tick" style="--i: 2;"></div><div class="tick" style="--i: 3;"></div><div class="tick" style="--i: 4;"></div><div class="tick" style="--i: 5;"></div><div class="tick" style="--i: 6;"></div><div class="tick" style="--i: 7;"></div><div class="tick" style="--i: 8;"></div><div class="tick" style="--i: 9;"></div><div class="tick" style="--i: 10;"></div><div class="tick" style="--i: 11;"></div><div class="tick" style="--i: 12;"></div>
  </div>
  <span style="font-weight: bold; margin-top: 8px; text-transform: uppercase; font-size: 0.85em;">{{ include.label }}</span>
  <span style="font-size: 0.75em; color: #888; margin-top: 2px;">
    {% if include.min %}{{ include.min }}-{{ include.max }}{% else %}{{ include.value }}/12{% endif %}
  </span>
</div>
